name: Sync Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to bump (e.g. 0.8.16)"
        required: true
        type: string

env:
  FORMULA_NAME: loctree
  HOMEBREW_TAP: Loctree/homebrew-loctree

jobs:
  homebrew:
    name: Sync Homebrew Formula
    runs-on: [self-hosted, Linux, X64, ops]
    permissions:
      contents: read
    steps:
      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${RELEASE_TAG_NAME#v}"
            VERSION="${VERSION#loctree-v}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Sync Homebrew tap
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: ${{ env.FORMULA_NAME }}
          download-url: https://crates.io/api/v1/crates/loctree/${{ steps.version.outputs.version }}/download
          homebrew-tap: ${{ env.HOMEBREW_TAP }}
          commit-message: |
            ${{ env.FORMULA_NAME }} ${{ steps.version.outputs.version }}

            Created by automated release workflow
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
