name: Publish Releases

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "loctree-v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-release:
    name: Verify Release State
    runs-on: [self-hosted, Linux, X64, ops]
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == loctree-v* ]]; then
            VERSION="${TAG#loctree-v}"
          else
            VERSION="${TAG#v}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"
          echo "Release version: $VERSION"

      - name: Verify checked-in versions
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          WORKSPACE_VERSION=$(awk '
            /^\[workspace.package\]$/ { in_section=1; next }
            in_section && /^version = / { gsub(/"/, "", $3); print $3; exit }
          ' Cargo.toml)
          NPM_VERSION=$(node -p "require('./distribution/npm/package.json').version")

          echo "Workspace version: $WORKSPACE_VERSION"
          echo "distribution/npm version: $NPM_VERSION"

          if [[ "$WORKSPACE_VERSION" != "$TAG_VERSION" ]]; then
            echo "Cargo workspace version does not match tag: $WORKSPACE_VERSION != $TAG_VERSION" >&2
            exit 1
          fi

          if [[ "$NPM_VERSION" != "$TAG_VERSION" ]]; then
            echo "distribution/npm version does not match tag: $NPM_VERSION != $TAG_VERSION" >&2
            exit 1
          fi

  publish-crates:
    name: Publish Rust Crates
    needs: verify-release
    runs-on: [self-hosted, Linux, X64, ops]
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install protoc
        run: |
          if ! command -v protoc >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y protobuf-compiler
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Release quality gate
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Publish report-leptos
        run: |
          cargo publish -p report-leptos 2>&1 || {
            if cargo search report-leptos 2>/dev/null | grep -q '"${{ needs.verify-release.outputs.version }}"'; then
              echo "report-leptos already at ${{ needs.verify-release.outputs.version }}, continuing"
            else
              exit 1
            fi
          }

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish loctree
        run: |
          cargo publish -p loctree 2>&1 || {
            if cargo search loctree 2>/dev/null | grep -q '"${{ needs.verify-release.outputs.version }}"'; then
              echo "loctree already at ${{ needs.verify-release.outputs.version }}, continuing"
            else
              exit 1
            fi
          }

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish loctree-mcp
        run: |
          cargo publish -p loctree-mcp 2>&1 || {
            if cargo search loctree-mcp 2>/dev/null | grep -q '"${{ needs.verify-release.outputs.version }}"'; then
              echo "loctree-mcp already at ${{ needs.verify-release.outputs.version }}, continuing"
            else
              exit 1
            fi
          }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.verify-release.outputs.tag }}
          name: loctree ${{ needs.verify-release.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## loctree v${{ needs.verify-release.outputs.version }}

            Installation:

            ```bash
            cargo install loctree
            npm install -g loctree
            brew tap Loctree/homebrew-loctree && brew install loctree
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Artifact
    needs: [verify-release, publish-crates]
    runs-on: [self-hosted, Linux, X64, ops]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release binaries
        run: cargo build -p loctree --release --target x86_64-unknown-linux-gnu

      - name: Package Linux artifact
        run: |
          mkdir -p dist/linux-x86_64
          cp target/x86_64-unknown-linux-gnu/release/loctree dist/linux-x86_64/loctree
          cp target/x86_64-unknown-linux-gnu/release/loct dist/linux-x86_64/loct
          chmod +x dist/linux-x86_64/loctree dist/linux-x86_64/loct
          tar -czf loctree-linux-x86_64.tar.gz -C dist/linux-x86_64 loctree loct

      - name: Upload Linux release asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.verify-release.outputs.tag }}
          files: loctree-linux-x86_64.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    name: Build macOS ARM64 Artifact
    needs: [verify-release, publish-crates]
    runs-on: [self-hosted, macOS, ARM64, dragon]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Import macOS signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/loctree-build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/loctree-build-cert.p12"
          CA_PATH="$RUNNER_TEMP/DeveloperIDG2CA.cer"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          curl -fsSL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o "$CA_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security import "$CA_PATH" -k "$KEYCHAIN" -T /usr/bin/codesign -T /usr/bin/security >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" /Library/Keychains/System.keychain /System/Library/Keychains/SystemRootCertificates.keychain login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Build release binaries
        run: cargo build -p loctree --release --target aarch64-apple-darwin

      - name: Package macOS ARM64 artifact
        env:
          MACOS_DEVELOPER_ID_APPLICATION: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          mkdir -p dist/darwin-aarch64
          cp target/aarch64-apple-darwin/release/loctree dist/darwin-aarch64/loctree
          cp target/aarch64-apple-darwin/release/loct dist/darwin-aarch64/loct
          chmod +x dist/darwin-aarch64/loctree dist/darwin-aarch64/loct
          bash distribution/macos/sign-and-notarize.sh dist/darwin-aarch64 loctree-darwin-aarch64-notarized.zip
          tar -czf loctree-darwin-aarch64.tar.gz -C dist/darwin-aarch64 loctree loct

      - name: Upload macOS ARM64 release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.verify-release.outputs.tag }}
          files: |
            loctree-darwin-aarch64.tar.gz
            loctree-darwin-aarch64-notarized.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Artifact
    needs: [verify-release, publish-crates]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binaries
        run: cargo build -p loctree --release --target x86_64-pc-windows-msvc

      - name: Package Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\loctree.exe dist\loctree.exe
          Copy-Item target\x86_64-pc-windows-msvc\release\loct.exe dist\loct.exe
          Compress-Archive -Path dist\* -DestinationPath loctree-windows-x86_64.exe.zip -Force

      - name: Upload Windows release asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.verify-release.outputs.tag }}
          files: loctree-windows-x86_64.exe.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish npm Packages
    needs:
      - verify-release
      - build-linux
      - build-macos-arm64
      - build-windows
    runs-on: [self-hosted, Linux, X64, ops]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Refresh npm package versions
        run: |
          node distribution/npm/sync-version.mjs "${{ needs.verify-release.outputs.version }}"
          cd distribution/npm
          ./CREATE_PLATFORM_PACKAGES.sh "${{ needs.verify-release.outputs.version }}"

      - name: Publish npm platform packages
        working-directory: distribution/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in platform-packages/*/; do
            (cd "$dir" && npm publish --access public)
          done
          sleep 20

      - name: Publish main npm package
        working-directory: distribution/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
